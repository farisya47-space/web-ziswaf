<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profil - Madarijus Salikin</title>
<link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@100..900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@tailwindcss/browser@4"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<style type="text/tailwindcss">
  :root {
    --primary: #004b72;
    --primary-hover: #003a59;
    --foreground: #080C1A;
    --secondary: #6A7686;
    --muted: #EFF2F7;
    --border: #F3F4F3;
    --success: #30B22D;
    --error: #ED6B60;
    --font-sans: 'Lexend Deca', sans-serif;
  }
  @theme inline {
    --color-primary: var(--primary);
    --color-primary-hover: var(--primary-hover);
    --color-foreground: var(--foreground);
    --color-secondary: var(--secondary);
    --color-muted: var(--muted);
    --color-border: var(--border);
    --color-success: var(--success);
    --color-error: var(--error);
    --font-sans: var(--font-sans);
  }
  .scrollbar-hide::-webkit-scrollbar { display: none; }
  .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
  .submenu { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; }
  .submenu.open { max-height: 200px; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }
</style>
</head>
<body class="font-sans bg-white min-h-screen">

<div id="sidebar-overlay" class="fixed inset-0 bg-black/80 z-40 lg:hidden hidden" onclick="toggleSidebar()"></div>

<div class="flex h-screen bg-muted overflow-hidden">
  <aside id="sidebar" class="flex flex-col w-[280px] h-screen fixed left-0 z-50 bg-white border-r border-border transform -translate-x-full lg:translate-x-0 transition-transform">
    <div class="flex items-center justify-between border-b border-border h-[90px] px-5 gap-3">
      <div class="flex items-center gap-3">
        <img src="img/logo-yayasan.png" alt="Logo" class="w-11 h-11 object-contain">
        <h1 class="font-semibold text-xl">Madarijus Salikin</h1>
      </div>
      <button onclick="toggleSidebar()" class="lg:hidden size-11 flex bg-white rounded-xl items-center justify-center ring-1 ring-border cursor-pointer">
        <i data-lucide="x" class="size-6 text-secondary"></i>
      </button>
    </div>
    
    <nav class="flex flex-col p-5 gap-6 overflow-y-auto flex-1">
      <div class="flex flex-col gap-4">
        <h3 class="font-medium text-sm text-secondary">Menu Utama</h3>
        <div class="flex flex-col gap-1">
          <a href="finance_dashboard.html" class="group nav-item cursor-pointer">
            <div class="flex items-center rounded-xl p-4 gap-3 hover:bg-muted transition-all group-[.active]:bg-primary/10 group-[.active]:text-primary">
              <i data-lucide="layout-dashboard" class="size-6 text-secondary group-[.active]:text-primary group-hover:text-foreground"></i>
              <span class="font-medium text-secondary group-[.active]:font-semibold group-[.active]:text-primary group-hover:text-foreground">Dashboard</span>
            </div>
          </a>
          <a href="finance_categories.html" class="group nav-item cursor-pointer">
            <div class="flex items-center rounded-xl p-4 gap-3 hover:bg-muted transition-all group-[.active]:bg-primary/10 group-[.active]:text-primary">
              <i data-lucide="folder" class="size-6 text-secondary group-[.active]:text-primary group-hover:text-foreground"></i>
              <span class="font-medium text-secondary group-[.active]:font-semibold group-[.active]:text-primary group-hover:text-foreground">Kategori</span>
            </div>
          </a>
          
          <div class="group nav-item cursor-pointer">
            <div class="flex items-center justify-between rounded-xl p-4 gap-3 hover:bg-muted transition-all" onclick="toggleSubmenu()">
              <div class="flex items-center gap-3">
                <i data-lucide="receipt" class="size-6 text-secondary"></i>
                <span class="font-medium text-secondary">Transaksi</span>
              </div>
              <i id="submenu-icon" data-lucide="chevron-down" class="size-4 text-secondary transition-transform"></i>
            </div>
            <div id="submenu" class="submenu">
              <a href="finance_income.html" class="flex items-center rounded-xl p-3 pl-14 gap-3 hover:bg-muted transition-all text-sm">
                <i data-lucide="trending-up" class="size-4 text-success"></i>
                <span class="font-medium text-secondary hover:text-foreground">Pemasukan</span>
              </a>
              <a href="finance_expense.html" class="flex items-center rounded-xl p-3 pl-14 gap-3 hover:bg-muted transition-all text-sm">
                <i data-lucide="trending-down" class="size-4 text-error"></i>
                <span class="font-medium text-secondary hover:text-foreground">Pengeluaran</span>
              </a>
            </div>
          </div>

          <a href="finance_reports.html" class="group nav-item cursor-pointer">
            <div class="flex items-center rounded-xl p-4 gap-3 hover:bg-muted transition-all group-[.active]:bg-primary/10 group-[.active]:text-primary">
              <i data-lucide="file-text" class="size-6 text-secondary group-[.active]:text-primary group-hover:text-foreground"></i>
              <span class="font-medium text-secondary group-[.active]:font-semibold group-[.active]:text-primary group-hover:text-foreground">Laporan</span>
            </div>
          </a>
          <a href="finance_profile.html" class="group nav-item active cursor-pointer">
            <div class="flex items-center rounded-xl p-4 gap-3 hover:bg-muted transition-all group-[.active]:bg-primary/10 group-[.active]:text-primary">
              <i data-lucide="user" class="size-6 text-secondary group-[.active]:text-primary group-hover:text-foreground"></i>
              <span class="font-medium text-secondary group-[.active]:font-semibold group-[.active]:text-primary group-hover:text-foreground">Profil</span>
            </div>
          </a>
        </div>
      </div>
    </nav>
  </aside>

  <main class="flex-1 lg:ml-[280px] flex flex-col bg-white min-h-screen">
    <div class="flex items-center justify-between h-[90px] border-b border-border bg-white px-5 md:px-8">
      <button onclick="toggleSidebar()" class="lg:hidden size-11 flex items-center justify-center rounded-xl ring-1 ring-border cursor-pointer">
        <i data-lucide="menu" class="size-6"></i>
      </button>
      <h2 class="hidden lg:block font-bold text-2xl">Profil Pengguna</h2>
      <div class="flex items-center gap-3">
        <div class="hidden md:flex items-center gap-3 pl-3 border-l border-border relative">
          <div class="text-right">
            <p class="font-semibold text-sm">Admin Keuangan</p>
            <p class="text-secondary text-xs">Administrator</p>
          </div>
          <div class="relative">
            <button onclick="toggleUserMenu(event)" class="size-11 rounded-full object-cover border border-border cursor-pointer">
              <img src="https://images.unsplash.com/photo-1599566150163-29194dcaad36?w=100&h=100&fit=crop" class="size-11 rounded-full object-cover">
            </button>
            <div id="user-menu" class="hidden absolute right-0 top-14 w-48 bg-white border border-border rounded-xl shadow-lg overflow-hidden z-50">
              <a href="login.html" class="flex items-center gap-3 px-4 py-3 hover:bg-muted transition-colors text-sm">
                <i data-lucide="log-out" class="size-4 text-error"></i>
                <span class="font-medium text-error">Logout</span>
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="flex-1 overflow-y-auto p-5 md:p-8">
      <div class="max-w-4xl mx-auto">
        <div class="bg-white border border-border rounded-2xl overflow-hidden shadow-sm">
          <div class="border-b border-border">
            <div class="flex gap-1 p-2">
              <button onclick="switchTab('profile')" class="tab-btn flex-1 px-6 py-3 rounded-xl font-semibold text-sm transition-all cursor-pointer bg-primary text-white" data-tab="profile">
                <i data-lucide="user" class="size-4 inline-block mr-2"></i>
                Ubah Profil
              </button>
              <button onclick="switchTab('password')" class="tab-btn flex-1 px-6 py-3 rounded-xl font-semibold text-sm transition-all cursor-pointer text-secondary hover:bg-muted" data-tab="password">
                <i data-lucide="lock" class="size-4 inline-block mr-2"></i>
                Ubah Kata Sandi
              </button>
            </div>
          </div>

          <div id="tab-profile" class="tab-content active p-6 md:p-8">
            <div class="flex flex-col items-center mb-8">
              <div class="relative">
                <img id="profile-preview" src="https://images.unsplash.com/photo-1599566150163-29194dcaad36?w=200&h=200&fit=crop" class="size-32 rounded-full object-cover border-4 border-border shadow-lg">
                <label for="photo-upload" class="absolute bottom-0 right-0 size-10 bg-primary hover:bg-primary-hover rounded-full flex items-center justify-center cursor-pointer shadow-lg transition-colors">
                  <i data-lucide="camera" class="size-5 text-white"></i>
                </label>
                <input type="file" id="photo-upload" accept="image/*" class="hidden" onchange="previewPhoto(event)">
              </div>
              <p class="text-sm text-secondary mt-4">Klik ikon kamera untuk mengubah foto</p>
            </div>

            <form class="flex flex-col gap-6">
              <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="flex flex-col gap-2">
                  <label class="text-sm font-semibold text-foreground">Nama Lengkap <span class="text-error">*</span></label>
                  <input type="text" value="Admin Keuangan" class="w-full px-4 py-3 rounded-xl border border-border focus:ring-1 focus:ring-primary outline-none bg-white text-sm">
                </div>
                <div class="flex flex-col gap-2">
                  <label class="text-sm font-semibold text-foreground">Username <span class="text-error">*</span></label>
                  <input type="text" value="admin" class="w-full px-4 py-3 rounded-xl border border-border focus:ring-1 focus:ring-primary outline-none bg-white text-sm">
                </div>
              </div>
              <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="flex flex-col gap-2">
                  <label class="text-sm font-semibold text-foreground">Email</label>
                  <input type="email" value="admin@madarijussalikin.sch.id" class="w-full px-4 py-3 rounded-xl border border-border focus:ring-1 focus:ring-primary outline-none bg-white text-sm">
                </div>
                <div class="flex flex-col gap-2">
                  <label class="text-sm font-semibold text-foreground">No. Telepon</label>
                  <input type="tel" value="081234567890" class="w-full px-4 py-3 rounded-xl border border-border focus:ring-1 focus:ring-primary outline-none bg-white text-sm">
                </div>
              </div>
              <div class="flex flex-col gap-2">
                <label class="text-sm font-semibold text-foreground">Jabatan</label>
                <input type="text" value="Administrator" readonly class="w-full px-4 py-3 rounded-xl border border-border bg-muted text-secondary text-sm cursor-not-allowed">
              </div>
              <div class="flex items-center justify-end gap-4 mt-4 pt-6 border-t border-border">
                <button type="button" class="px-6 py-2.5 rounded-xl font-bold text-secondary hover:bg-muted transition-colors cursor-pointer text-sm">Batal</button>
                <button type="button" onclick="saveProfile()" class="px-6 py-2.5 rounded-xl font-bold bg-primary text-white hover:bg-primary-hover shadow-lg shadow-primary/20 transition-all transform hover:-translate-y-0.5 cursor-pointer flex items-center gap-2 text-sm">
                  <i data-lucide="save" class="size-4"></i>
                  <span>Simpan Perubahan</span>
                </button>
              </div>
            </form>
          </div>

          <div id="tab-password" class="tab-content p-6 md:p-8">
            <div class="max-w-xl mx-auto">
              <div class="bg-primary/5 border border-primary/20 rounded-xl p-4 mb-6 flex items-start gap-3">
                <i data-lucide="info" class="size-5 text-primary flex-shrink-0 mt-0.5"></i>
                <div class="text-sm text-primary">
                  <p class="font-semibold mb-1">Keamanan Kata Sandi</p>
                  <p>Gunakan minimal 8 karakter dengan kombinasi huruf besar, huruf kecil, dan angka.</p>
                </div>
              </div>

              <form class="flex flex-col gap-6">
                <div class="flex flex-col gap-2">
                  <label class="text-sm font-semibold text-foreground">Kata Sandi Lama <span class="text-error">*</span></label>
                  <div class="relative">
                    <input id="old-password" type="password" placeholder="Masukkan kata sandi lama" class="w-full px-4 py-3 rounded-xl border border-border focus:ring-1 focus:ring-primary outline-none bg-white text-sm pr-12">
                    <button type="button" onclick="togglePassword('old-password', 'old-eye')" class="absolute right-4 top-1/2 -translate-y-1/2 text-secondary hover:text-foreground transition-colors">
                      <i id="old-eye" data-lucide="eye" class="size-5"></i>
                    </button>
                  </div>
                </div>
                <div class="flex flex-col gap-2">
                  <label class="text-sm font-semibold text-foreground">Kata Sandi Baru <span class="text-error">*</span></label>
                  <div class="relative">
                    <input id="new-password" type="password" placeholder="Masukkan kata sandi baru" class="w-full px-4 py-3 rounded-xl border border-border focus:ring-1 focus:ring-primary outline-none bg-white text-sm pr-12">
                    <button type="button" onclick="togglePassword('new-password', 'new-eye')" class="absolute right-4 top-1/2 -translate-y-1/2 text-secondary hover:text-foreground transition-colors">
                      <i id="new-eye" data-lucide="eye" class="size-5"></i>
                    </button>
                  </div>
                </div>
                <div class="flex flex-col gap-2">
                  <label class="text-sm font-semibold text-foreground">Konfirmasi Kata Sandi Baru <span class="text-error">*</span></label>
                  <div class="relative">
                    <input id="confirm-password" type="password" placeholder="Masukkan ulang kata sandi baru" class="w-full px-4 py-3 rounded-xl border border-border focus:ring-1 focus:ring-primary outline-none bg-white text-sm pr-12">
                    <button type="button" onclick="togglePassword('confirm-password', 'confirm-eye')" class="absolute right-4 top-1/2 -translate-y-1/2 text-secondary hover:text-foreground transition-colors">
                      <i id="confirm-eye" data-lucide="eye" class="size-5"></i>
                    </button>
                  </div>
                </div>
                <div class="flex items-center justify-end gap-4 mt-4 pt-6 border-t border-border">
                  <button type="button" class="px-6 py-2.5 rounded-xl font-bold text-secondary hover:bg-muted transition-colors cursor-pointer text-sm">Batal</button>
                  <button type="button" onclick="changePassword()" class="px-6 py-2.5 rounded-xl font-bold bg-primary text-white hover:bg-primary-hover shadow-lg shadow-primary/20 transition-all transform hover:-translate-y-0.5 cursor-pointer flex items-center gap-2 text-sm">
                    <i data-lucide="lock" class="size-4"></i>
                    <span>Ubah Kata Sandi</span>
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
lucide.createIcons();

function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebar-overlay');
  sidebar.classList.toggle('-translate-x-full');
  overlay.classList.toggle('hidden');
}

function toggleSubmenu() {
  const submenu = document.getElementById('submenu');
  const icon = document.getElementById('submenu-icon');
  submenu.classList.toggle('open');
  icon.style.transform = submenu.classList.contains('open') ? 'rotate(180deg)' : 'rotate(0deg)';
}

function toggleUserMenu(event) {
  event.stopPropagation();
  const menu = document.getElementById('user-menu');
  menu.classList.toggle('hidden');
}

function switchTab(tab) {
  document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.classList.remove('bg-primary', 'text-white');
    btn.classList.add('text-secondary', 'hover:bg-muted');
  });
  
  document.getElementById('tab-' + tab).classList.add('active');
  const activeBtn = document.querySelector(`[data-tab="${tab}"]`);
  activeBtn.classList.add('bg-primary', 'text-white');
  activeBtn.classList.remove('text-secondary', 'hover:bg-muted');
  
  lucide.createIcons();
}

function previewPhoto(event) {
  const file = event.target.files[0];
  if (file) {
    const reader = new FileReader();
    reader.onload = function(e) {
      document.getElementById('profile-preview').src = e.target.result;
    };
    reader.readAsDataURL(file);
  }
}

function togglePassword(inputId, iconId) {
  const input = document.getElementById(inputId);
  const icon = document.getElementById(iconId);
  if (input.type === 'password') {
    input.type = 'text';
    icon.setAttribute('data-lucide', 'eye-off');
  } else {
    input.type = 'password';
    icon.setAttribute('data-lucide', 'eye');
  }
  lucide.createIcons();
}

function saveProfile() {
  alert('Profil berhasil diperbarui!');
}

function changePassword() {
  const oldPass = document.getElementById('old-password').value;
  const newPass = document.getElementById('new-password').value;
  const confirmPass = document.getElementById('confirm-password').value;
  
  if (!oldPass || !newPass || !confirmPass) {
    alert('Semua field harus diisi!');
    return;
  }
  
  if (newPass !== confirmPass) {
    alert('Kata sandi baru dan konfirmasi tidak cocok!');
    return;
  }
  
  if (newPass.length < 8) {
    alert('Kata sandi minimal 8 karakter!');
    return;
  }
  
  alert('Kata sandi berhasil diubah!');
  document.getElementById('old-password').value = '';
  document.getElementById('new-password').value = '';
  document.getElementById('confirm-password').value = '';
}

// Close dropdown when clicking outside
document.addEventListener('click', function(event) {
  const userMenu = document.getElementById('user-menu');
  const userButton = event.target.closest('button[onclick="toggleUserMenu(event)"]');
  
  if (!userButton && userMenu && !userMenu.classList.contains('hidden')) {
    userMenu.classList.add('hidden');
  }
});
</script>

</body>
</html>
